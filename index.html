<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIEW - Statistiky Google Moje Firma</title>
    
    <!-- Scripts & Styles -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Prop-Types must be loaded before Recharts -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts@2.1.16/umd/Recharts.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;700&family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --google-font: 'Google Sans', 'Product Sans', 'Open Sans', 'Roboto', Arial, sans-serif;
        }
        * {
            font-family: var(--google-font) !important;
        }
        body {
            background-color: #F8F9FA;
            color: #3C4043;
        }
        h1, h2, h3, h4, .font-bold {
            letter-spacing: -0.01em;
        }
        /* Custom transitions for Recharts and Modals */
        .recharts-cartesian-grid-horizontal line, .recharts-cartesian-grid-vertical line {
            stroke: #f1f3f4;
        }
        .transition-all {
            transition: all 0.3s ease;
        }
        .aspect-video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            overflow: hidden;
            border-radius: 12px;
        }
        .aspect-video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, 
            BarChart, Bar, Cell
        } = window.Recharts;

        // --- MANUÁLNÍ IKONY (SVG) ---
        const Icon = ({ name, className = "w-5 h-5", strokeWidth = 2 }) => {
            const icons = {
                users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                eye: <><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></>,
                star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
                globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10z"/></>,
                search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
                trendingUp: <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
                trendingDown: <><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></>,
                barChart: <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
                alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                chevronRight: <polyline points="9 18 15 12 9 6"/>,
                arrowRight: <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
                phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>,
                map: <><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></>,
                mouse: <><rect x="5" y="2" width="14" height="20" rx="7"/><line x1="12" y1="6" x2="12" y2="10"/></>,
                target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
                award: <><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- MOCK DATA ---
        const generateData = () => {
            const months = ['Led', 'Úno', 'Bře', 'Dub', 'Kvě', 'Čer', 'Čec', 'Srp', 'Zář', 'Říj', 'Lis', 'Pro'];
            return months.map(m => {
                const hovory = Math.floor(Math.random() * 50) + 40;
                const trasy = Math.floor(Math.random() * 120) + 150;
                const web = Math.floor(Math.random() * 80) + 100;
                const streetView = Math.floor(Math.random() * 3000) + 10000;
                
                const prevHovory = Math.floor(Math.random() * 40) + 30;
                const prevTrasy = Math.floor(Math.random() * 100) + 120;
                const prevWeb = Math.floor(Math.random() * 70) + 80;
                const prevStreetView = Math.floor(Math.random() * 2000) + 9000;

                return {
                    name: m,
                    hovory,
                    trasy,
                    web,
                    streetView,
                    prevHovory,
                    prevTrasy,
                    prevWeb,
                    prevStreetView,
                    interakce: hovory + trasy + web,
                    prevInterakce: prevHovory + prevTrasy + prevWeb
                };
            });
        };

        const welcomeStats = [
            { id: 'interakce', title: 'Interakce celkem', total: 124580, periodValue: 3412, periodTrend: 12.5, icon: 'users', color: '#34A853', description: 'Hovory, navigace a prokliky na web.' },
            { id: 'streetview', title: 'Zobrazení prohlídky', total: 842105, periodValue: 12840, periodTrend: -4.2, icon: 'globe', color: '#4285F4', description: 'Zhlédnutí 360° prohlídek a fotek.' },
            { id: 'zobrazeni', title: 'Zobrazení profilu', total: 2154300, periodValue: 84200, periodTrend: 5.2, icon: 'eye', color: '#4285F4', description: 'Lidé, kteří viděli váš profil na Googlu.' },
            { id: 'vyhledavani', title: 'Nalezení vyhledáváním', total: 1542000, periodValue: 56120, periodTrend: 8.9, icon: 'search', color: '#EA4335', description: 'Dotazy vedoucí k vašemu profilu.' }
        ];

        const interactionDetails = {
            trasy: {
                title: 'Vyžádání trasy',
                icon: 'map',
                color: '#34A853',
                meaning: 'Zákazníci si aktivně vyhledali cestu k vaší pobočce v Mapách Google.',
                benefit: 'Toto je nejsilnější signál reálného zájmu. Čím více tras, tím více lidí fyzicky vstoupilo do vašich dveří. Každá trasa je potenciální nákup!'
            },
            web: {
                title: 'Návštěvy webu',
                icon: 'mouse',
                color: '#4285F4',
                meaning: 'Uživatelé klikli na tlačítko „Web“ přímo ve vašem firemním profilu.',
                benefit: 'Získáváte relevantní návštěvnost bez nákladů na reklamu. Lidé se chtějí dozvědět více o vaší nabídce, jídelním lístku nebo ceníku.'
            },
            hovory: {
                title: 'Telefonáty',
                icon: 'phone',
                color: '#EA4335',
                meaning: 'Počet přímých vytočení vašeho čísla jedním kliknutím z mobilního vyhledávání.',
                benefit: 'Telefonát je nejrychlejší cesta k uzavření obchodu. Tito lidé mají okamžitý dotaz a chtějí u vás nakoupit právě teď.'
            }
        };

        // Jednotný formát pro kroky z virtuální prohlídky s reálnými URL a pořadím
        const topSteps = [
            { id: 1, rank: "1. místo", color: "#FFD700", title: 'Krok z virtuální prohlídky', views: 24500, embedUrl: 'https://www.google.com/maps/embed?pb=!4v1775715361745!6m8!1m7!1sCAoSF0NJSE0wb2dLRUlDQWdJQzN3LW53akFF!2m2!1d50.04255807996196!2d15.77225026634575!3f66.97761681063815!4f-2.331028279394502!5f0.7820865974627469' },
            { id: 2, rank: "2. místo", color: "#C0C0C0", title: 'Krok z virtuální prohlídky', views: 18200, embedUrl: 'https://www.google.com/maps/embed?pb=!4v1775715399654!6m8!1m7!1sCAoSFkNJSE0wb2dLRUlDQWdJQzN3NlhfUUE.!2m2!1d50.0426206116332!2d15.77216330488757!3f347.8940540545073!4f-12.537977008895155!5f0.4000000000000002' },
            { id: 3, rank: "3. místo", color: "#CD7F32", title: 'Krok z virtuální prohlídky', views: 12400, embedUrl: 'https://www.google.com/maps/embed?pb=!4v1775715417837!6m8!1m7!1sCAoSFkNJSE0wb2dLRUlDQWdJQzN3X24zU3c.!2m2!1d50.04269573454846!2d15.7725293643046!3f248.9847873713557!4f-1.5409597818569694!5f0.4000000000000002' }
        ];

        // --- MODAL ---
        const RecommendationsModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm text-sm" onClick={onClose}>
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl border border-[#DADCE0] overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="px-8 py-5 border-b border-[#DADCE0] flex justify-between items-center bg-[#F8F9FA]">
                            <div className="flex items-center gap-3 text-[#EA4335]">
                                <Icon name="alert" className="w-6 h-6" />
                                <h2 className="font-bold text-gray-900 text-lg">Strategie pro obnovení růstu</h2>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-200 rounded-full transition-colors text-gray-500"><Icon name="x" className="w-5 h-5" /></button>
                        </div>
                        <div className="p-8 space-y-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="p-5 bg-white border border-[#DADCE0] rounded-xl shadow-sm">
                                    <h3 className="text-xs font-bold text-gray-400 uppercase mb-3">Analýza Sezónnosti</h3>
                                    <p className="text-gray-600 leading-relaxed text-xs">Pokles může být přirozený. Prověřujeme historické trendy na trhu.</p>
                                </div>
                                <div className="p-5 bg-white border border-[#DADCE0] rounded-xl shadow-sm">
                                    <h3 className="text-xs font-bold text-gray-400 uppercase mb-3">Kvalita obsahu</h3>
                                    <p className="text-gray-600 leading-relaxed text-xs">Google upřednostňuje profily s novými fotkami. Přidejte 3–5 snímků měsíčně.</p>
                                </div>
                            </div>
                        </div>
                        <div className="p-6 border-t border-[#DADCE0] flex justify-center bg-[#F8F9FA]">
                            <button onClick={onClose} className="bg-gray-900 text-white px-10 py-3 rounded-full text-sm font-bold hover:bg-black transition-all flex items-center gap-3 shadow-lg">
                                Rozumím, zavřít <Icon name="arrowRight" className="w-4 h-4" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- KPI CARD ---
        const WelcomeKpiCard = ({ stat }) => {
            const isNegative = stat.periodTrend < 0;
            return (
                <div className="bg-white border border-[#DADCE0] p-6 rounded-xl shadow-sm hover:shadow-md transition-all group">
                    <div className="flex justify-between items-start mb-5">
                        <div className="text-gray-300 group-hover:text-[#34A853] transition-colors">
                            <Icon name={stat.icon} className="w-6 h-6" />
                        </div>
                        <div className="text-right">
                            <div className={`flex items-center font-bold text-sm ${isNegative ? 'text-[#EA4335]' : 'text-[#34A853]'}`}>
                                <Icon name={isNegative ? 'trendingDown' : 'trendingUp'} className="w-4 h-4 mr-1" />
                                {Math.abs(stat.periodTrend)}%
                            </div>
                            <div className="text-[9px] text-gray-400 font-bold uppercase tracking-wider">vs loni</div>
                        </div>
                    </div>
                    <div className="mb-5">
                        <h3 className="text-gray-400 text-[10px] font-bold uppercase tracking-widest mb-1.5 leading-none">{stat.title}</h3>
                        <div className="text-3xl font-black text-gray-900 tracking-tighter leading-none">{stat.periodValue.toLocaleString()}</div>
                    </div>
                    <div className="pt-5 border-t border-[#F1F3F4] flex justify-between items-center">
                        <div className="leading-tight">
                            <p className="text-[9px] text-gray-400 font-bold uppercase mb-0.5 tracking-tighter">Historický součet</p>
                            <p className="text-base font-light text-gray-500 tracking-tight">{stat.total.toLocaleString()}</p>
                        </div>
                        <div className="group/info relative cursor-help">
                            <Icon name="info" className="w-3.5 h-3.5 text-gray-200 hover:text-gray-400" />
                            <div className="absolute bottom-full right-0 mb-3 w-48 p-3 bg-gray-900 text-white text-[10px] rounded-lg shadow-2xl opacity-0 invisible group-hover/info:opacity-100 group-hover/info:visible transition-all z-20 leading-relaxed">
                                {stat.description}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- APP ---
        function App() {
            const [isModalOpen, setModalOpen] = React.useState(false);
            const [viewType, setViewType] = React.useState('měsíc');
            const [selectedDetail, setSelectedDetail] = React.useState('trasy');
            const data = React.useMemo(() => generateData(), [viewType]);
            const hasNegativeTrend = React.useMemo(() => welcomeStats.some(s => s.periodTrend < 0), []);

            const activeDetail = interactionDetails[selectedDetail];

            return (
                <div className="min-h-screen pb-20">
                    <RecommendationsModal isOpen={isModalOpen} onClose={() => setModalOpen(false)} />

                    {/* HEADER */}
                    <header className="sticky top-0 z-50 bg-white border-b border-[#DADCE0] shadow-sm">
                        <div className="py-3 px-4 md:px-10 border-b border-gray-100 flex items-center justify-start">
                            <div className="h-7 md:h-8">
                                <img src="https://viewcz.com/images/svg/head-logo.svg" alt="VIEW" className="h-full w-auto object-contain block opacity-90" />
                            </div>
                        </div>
                        <div className="py-2.5 px-4 md:px-10 flex items-center justify-start bg-white/50">
                            <div className="flex items-center gap-3">
                                <div className="text-[#34A853]"><Icon name="barChart" className="w-5 h-5" strokeWidth={2.5} /></div>
                                <div className="flex items-center gap-2 text-sm md:text-base font-normal text-gray-700">
                                    <span className="font-medium text-gray-600">Statistiky</span>
                                    <div className="flex items-center h-5 border-l border-gray-300 ml-1 pl-3">
                                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/3840px-Google_2015_logo.svg.png" alt="Google" className="h-4 md:h-5 w-auto block object-contain" />
                                        <span className="font-light text-gray-500 ml-2 whitespace-nowrap">Moje Firma</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 md:px-10 pt-10">
                        {/* WELCOME */}
                        <div className="bg-white border border-[#DADCE0] p-8 md:p-12 rounded-2xl mb-12 shadow-sm">
                            <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-10 mb-12">
                                <div className="max-w-3xl text-gray-500 text-lg md:text-xl leading-relaxed font-light">
                                    <div className="inline-flex items-center gap-2 bg-[#E6F4EA] text-[#34A853] px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-6">Souhrnný přehled firemní prezentace</div>
                                    <p>Tento dashboard zobrazuje aktuální výsledky a efektivitu vaší prezentace na Googlu spravované v systému <strong className="text-gray-900 font-bold">VIEW</strong>. Data reprezentují souhrnnou aktivitu uživatelů napříč lokalitami.</p>
                                    {hasNegativeTrend && (
                                        <button onClick={() => setModalOpen(true)} className="flex items-center gap-3 bg-[#FCE8E6] hover:bg-[#FAD2CF] text-[#C5221F] px-6 py-3 rounded-xl text-sm font-bold mt-8 transition-all border border-[#FAD2CF] group shadow-sm">
                                            <Icon name="alert" className="w-5 h-5 animate-pulse" /> Zobrazit doporučení pro růst <Icon name="chevronRight" className="w-4 h-4 group-hover:translate-x-1 transition-transform" />
                                        </button>
                                    )}
                                </div>
                                <div className="bg-[#F8F9FA] border border-[#DADCE0] p-6 rounded-xl text-center min-w-[240px]">
                                    <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-2">Aktuálně zobrazeno</p>
                                    <p className="text-xl font-black text-gray-800 tracking-tight">Posledních 30 dní</p>
                                    <div className="my-4 h-[1px] bg-gray-200 w-full opacity-50"></div>
                                    <p className="text-[10px] text-[#34A853] font-bold uppercase tracking-wider">Vs stejné období 2024</p>
                                </div>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                                {welcomeStats.map(stat => <WelcomeKpiCard key={stat.id} stat={stat} />)}
                            </div>
                        </div>

                        {/* HLAVNÍ TREND INTERAKCÍ */}
                        <div className="mt-20">
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-6 mb-10">
                                <div className="flex items-center gap-4">
                                    <div className="p-3 bg-white border border-[#DADCE0] text-[#34A853] rounded-xl shadow-sm"><Icon name="users" className="w-6 h-6" /></div>
                                    <h2 className="text-2xl font-black text-gray-800 tracking-tight italic uppercase">Celkový vývoj interakcí</h2>
                                </div>
                                <div className="flex gap-1 p-1 bg-white border border-[#DADCE0] rounded-full shadow-sm overflow-hidden">
                                    {['týden', 'měsíc', 'rok'].map(type => (
                                        <button key={type} onClick={() => setViewType(type)} className={`px-5 py-2 text-[10px] font-bold uppercase tracking-widest rounded-full transition-all ${viewType === type ? 'bg-[#34A853] text-white shadow-md' : 'text-gray-400 hover:text-gray-600'}`}>
                                            {type}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white p-10 md:p-14 border border-[#DADCE0] rounded-2xl shadow-sm mb-12">
                                <div className="flex justify-between items-center mb-12 text-xs font-bold text-gray-400 uppercase tracking-widest">
                                    <p>Meziroční srovnání aktivity</p>
                                    <div className="flex gap-6">
                                        <span className="flex items-center gap-2.5 text-[#34A853]"><div className="w-3 h-3 rounded-full bg-[#34A853]" /> Aktuální</span>
                                        <span className="flex items-center gap-2.5"><div className="w-3 h-0.5 bg-gray-300" /> Loni</span>
                                    </div>
                                </div>
                                <div className="h-[420px] w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <AreaChart data={data}>
                                            <defs>
                                                <linearGradient id="colorInt" x1="0" y1="0" x2="0" y2="1">
                                                    <stop offset="5%" stopColor="#34A853" stopOpacity={0.1}/>
                                                    <stop offset="95%" stopColor="#34A853" stopOpacity={0}/>
                                                </linearGradient>
                                            </defs>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#70757a', fontSize: 11, fontWeight: 900}} dy={15} />
                                            <YAxis axisLine={false} tickLine={false} tick={{fill: '#70757a', fontSize: 11, fontWeight: 900}} />
                                            <Tooltip contentStyle={{borderRadius: '12px', border: '1px solid #DADCE0', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)'}} />
                                            <Area type="monotone" dataKey="prevInterakce" name="Minulý rok" stroke="#cbd5e1" fill="transparent" strokeDasharray="5 5" strokeWidth={2} />
                                            <Area type="monotone" dataKey="interakce" name="Aktuální rok" stroke="#34A853" fill="url(#colorInt)" strokeWidth={4} />
                                        </AreaChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>

                        {/* DETAILNÍ ANALÝZA AKTIVIT S PŘEPÍNAČEM */}
                        <div className="mt-24">
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-6 mb-10">
                                <div className="flex items-center gap-4">
                                    <div className="p-3 bg-white border border-[#DADCE0] text-[#4285F4] rounded-xl shadow-sm"><Icon name="target" className="w-6 h-6" /></div>
                                    <div>
                                        <h2 className="text-2xl font-black text-gray-800 tracking-tight italic uppercase">Detailní analýza aktivit</h2>
                                        <p className="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">Sledujte konkrétní přínos jednotlivých kanálů</p>
                                    </div>
                                </div>
                                
                                <div className="flex gap-1 p-1 bg-white border border-[#DADCE0] rounded-full shadow-sm overflow-hidden">
                                    {['trasy', 'web', 'hovory'].map(type => (
                                        <button 
                                            key={type} 
                                            onClick={() => setSelectedDetail(type)} 
                                            className={`px-5 py-2 text-[10px] font-bold uppercase tracking-widest rounded-full transition-all flex items-center gap-2 ${selectedDetail === type ? 'bg-[#4285F4] text-white shadow-md' : 'text-gray-400 hover:text-gray-600'}`}
                                        >
                                            <Icon name={interactionDetails[type].icon} className="w-3 h-3" strokeWidth={3} />
                                            {interactionDetails[type].title}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-2 bg-white p-10 md:p-12 border border-[#DADCE0] rounded-2xl shadow-sm">
                                    <div className="flex justify-between items-center mb-10">
                                        <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest italic">Trend: {activeDetail.title}</h3>
                                        <div className="flex gap-4 text-[10px] font-bold uppercase">
                                            <span className="flex items-center gap-1.5" style={{ color: activeDetail.color }}>
                                                <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: activeDetail.color }} /> Aktuálně
                                            </span>
                                            <span className="flex items-center gap-1.5 text-gray-300">
                                                <div className="w-2.5 h-0.5 bg-gray-200" /> Minulý rok
                                            </span>
                                        </div>
                                    </div>
                                    <div className="h-[350px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={data}>
                                                <defs>
                                                    <linearGradient id="colorDetail" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor={activeDetail.color} stopOpacity={0.15}/>
                                                        <stop offset="95%" stopColor={activeDetail.color} stopOpacity={0}/>
                                                    </linearGradient>
                                                </defs>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#70757a', fontSize: 11, fontWeight: 900}} dy={15} />
                                                <YAxis axisLine={false} tickLine={false} tick={{fill: '#70757a', fontSize: 11, fontWeight: 900}} />
                                                <Tooltip contentStyle={{borderRadius: '12px', border: '1px solid #DADCE0', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)'}} />
                                                <Area type="monotone" dataKey={`prev${selectedDetail.charAt(0).toUpperCase() + selectedDetail.slice(1)}`} name="Minulý rok" stroke="#cbd5e1" fill="transparent" strokeDasharray="4 4" strokeWidth={1.5} />
                                                <Area type="monotone" dataKey={selectedDetail} name="Letošní rok" stroke={activeDetail.color} fill="url(#colorDetail)" strokeWidth={4} />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-6">
                                    <div className="bg-white border border-[#DADCE0] p-8 rounded-2xl shadow-sm h-full flex flex-col">
                                        <div className="flex items-center gap-4 mb-6">
                                            <div className="p-3 rounded-xl" style={{ backgroundColor: `${activeDetail.color}10`, color: activeDetail.color }}>
                                                <Icon name={activeDetail.icon} className="w-6 h-6" strokeWidth={2.5} />
                                            </div>
                                            <h3 className="font-black text-gray-900 text-lg uppercase">{activeDetail.title}</h3>
                                        </div>
                                        
                                        <div className="space-y-8">
                                            <div>
                                                <h4 className="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-3">Co to znamená?</h4>
                                                <p className="text-sm text-gray-600 leading-relaxed font-medium">
                                                    {activeDetail.meaning}
                                                </p>
                                            </div>
                                            
                                            <div className="bg-gray-50 border-l-4 p-5 rounded-r-xl" style={{ borderColor: activeDetail.color }}>
                                                <h4 className="text-[10px] font-black uppercase tracking-[0.2em] mb-2" style={{ color: activeDetail.color }}>Proč je to skvělé?</h4>
                                                <p className="text-sm text-gray-700 leading-relaxed italic font-bold">
                                                    "{activeDetail.benefit}"
                                                </p>
                                            </div>

                                            <div className="mt-auto pt-6 border-t border-gray-100">
                                                <div className="flex items-center justify-between text-[11px] font-black text-gray-400 uppercase tracking-widest">
                                                    <span>Efektivita kanálu</span>
                                                    <span className="text-[#34A853]">Vysoká</span>
                                                </div>
                                                <div className="w-full h-1.5 bg-gray-100 rounded-full mt-2 overflow-hidden">
                                                    <div className="h-full bg-[#34A853] rounded-full" style={{ width: '85%' }} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* SEKCE: GOOGLE STREET VIEW S REÁLNÝMI UKÁZKAMI A ŽEBŘÍČKEM */}
                        <div className="mt-24">
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-6 mb-10">
                                <div className="flex items-center gap-4">
                                    <div className="p-3 bg-white border border-[#DADCE0] text-[#4285F4] rounded-xl shadow-sm"><Icon name="globe" className="w-6 h-6" strokeWidth={2.5} /></div>
                                    <div>
                                        <h2 className="text-2xl font-black text-gray-800 tracking-tight italic uppercase">Virtuální prohlídka & Street View</h2>
                                        <p className="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">Analýza vizuálního zásahu vašich 360° snímků</p>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                                {/* Hlavní suma Street View v modré se zeleným nárůstem */}
                                <div className="lg:col-span-1 bg-white border border-[#DADCE0] p-8 rounded-2xl shadow-sm flex flex-col justify-center text-center">
                                    <div className="text-[#4285F4] mb-4 flex justify-center"><Icon name="camera" className="w-10 h-10" /></div>
                                    <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Zobrazení celkem</h3>
                                    <div className="text-5xl font-black text-gray-900 tracking-tighter mb-4">
                                        {data.reduce((sum, item) => sum + item.streetView, 0).toLocaleString()}
                                    </div>
                                    {/* Zvýrazněný zelený nárůst */}
                                    <div className="flex items-center justify-center gap-2 text-base font-black text-[#34A853] bg-[#E6F4EA] py-2 px-4 rounded-full">
                                        <Icon name="trendingUp" className="w-5 h-5" strokeWidth={3} />
                                        <span>+18.4 % meziročně</span>
                                    </div>
                                    <p className="text-[10px] text-gray-400 mt-6 leading-relaxed italic">
                                        "Vaše virtuální prohlídka aktivně buduje důvěru zákazníků ještě před jejich návštěvou."
                                    </p>
                                </div>

                                {/* Graf návštěvnosti Street View v modré */}
                                <div className="lg:col-span-3 bg-white p-8 md:p-10 border border-[#DADCE0] rounded-2xl shadow-sm">
                                    <div className="flex justify-between items-center mb-8">
                                        <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest italic">Vývoj zobrazení panoramat</h3>
                                        <div className="flex gap-6 text-[10px] font-black uppercase tracking-widest">
                                            <span className="flex items-center gap-2.5 text-[#4285F4]"><div className="w-3 h-3 rounded-full bg-[#4285F4] shadow-sm" /> Aktuální</span>
                                            <span className="flex items-center gap-2.5 text-gray-300"><div className="w-3 h-0.5 bg-gray-200" /> Loni</span>
                                        </div>
                                    </div>
                                    <div className="h-[280px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={data}>
                                                <defs>
                                                    <linearGradient id="colorSV" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor="#4285F4" stopOpacity={0.15}/>
                                                        <stop offset="95%" stopColor="#4285F4" stopOpacity={0}/>
                                                    </linearGradient>
                                                </defs>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#70757a', fontSize: 10, fontWeight: 700}} dy={10} />
                                                <YAxis axisLine={false} tickLine={false} tick={{fill: '#70757a', fontSize: 10, fontWeight: 700}} />
                                                <Tooltip contentStyle={{borderRadius: '12px', border: '1px solid #DADCE0'}} />
                                                <Area type="monotone" dataKey="prevStreetView" name="Minulý rok" stroke="#cbd5e1" fill="transparent" strokeDasharray="5 5" strokeWidth={1.5} />
                                                <Area type="monotone" dataKey="streetView" name="Letošní rok" stroke="#4285F4" fill="url(#colorSV)" strokeWidth={4} />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </div>

                            {/* Žebříček Top 3 Snímků s medailemi a pořadím */}
                            <div className="mt-12">
                                <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-8 px-2 text-center md:text-left">Nejnavštěvovanější kroky prohlídky</h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    {topSteps.map((step) => (
                                        <div key={step.id} className="bg-white border border-[#DADCE0] p-5 rounded-2xl shadow-sm hover:shadow-md transition-all group relative overflow-hidden">
                                            {/* Rank Badge / Medaile */}
                                            <div className="absolute top-0 left-0 w-16 h-16 pointer-events-none">
                                                <div className="absolute transform -rotate-45 bg-white border-b border-r border-gray-100 w-24 h-10 -left-8 top-1 flex items-center justify-center shadow-sm z-20">
                                                    <span className="text-[10px] font-black uppercase text-gray-800 tracking-tighter pl-4">{step.rank}</span>
                                                </div>
                                            </div>

                                            {/* Iframe náhled kroku */}
                                            <div className="aspect-video-container mb-6 bg-gray-100 shadow-inner">
                                                <iframe 
                                                    src={step.embedUrl} 
                                                    loading="lazy" 
                                                    allowFullScreen 
                                                    referrerPolicy="no-referrer-when-downgrade"
                                                    title={step.title}>
                                                </iframe>
                                            </div>
                                            
                                            <div className="flex justify-between items-center mb-4">
                                                <div className="flex items-center gap-2">
                                                    <div style={{ color: step.color }}>
                                                        <Icon name="award" className="w-5 h-5" strokeWidth={3} />
                                                    </div>
                                                    <h4 className="text-xs font-black text-gray-800 uppercase tracking-tight">{step.title}</h4>
                                                </div>
                                                <span className="bg-[#4285F4]/10 text-[#4285F4] px-2 py-1 rounded text-[8px] font-black uppercase">Top výkon</span>
                                            </div>
                                            
                                            <div className="pt-5 border-t border-gray-50 flex items-center justify-between">
                                                <div>
                                                    <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-0.5">Zobrazení v období</p>
                                                    <p className="text-2xl font-black text-[#4285F4] tracking-tighter leading-none">{step.views.toLocaleString()}</p>
                                                </div>
                                                <div className="text-[#34A853] flex items-center gap-1.5 text-[10px] font-bold bg-[#E6F4EA] px-2 py-1 rounded-lg">
                                                    <Icon name="trendingUp" className="w-3 h-3" strokeWidth={3} />
                                                    <span>Skvělé</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <footer className="mt-32 pt-12 border-t border-[#DADCE0] flex flex-col md:flex-row justify-between items-center text-gray-400 text-[10px] font-bold uppercase tracking-[0.3em] gap-8 text-center md:text-left">
                            <p>© 2024 VIEW - Autorizovaný partner Google</p>
                            <div className="flex gap-8 items-center">
                                <span>Google My Business API</span>
                                <span className="text-gray-200">|</span>
                                <span className="text-gray-800 font-bold">v3.8.0-GITHUB</span>
                            </div>
                        </footer>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
